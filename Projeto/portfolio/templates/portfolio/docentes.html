{% extends "portfolio/base.html" %}
{% block content %}
<h2>Docentes</h2>
<section>
    {% for doc in docentes %}
    <article>
        <header>
            <h3>{{ doc.nome }}</h3>
            <p>{{ doc.email }}</p>
        </header>
        {% if doc.pagina_pessoal %}
        <section>
            <h4>Links</h4>
            <p><a href="{{ doc.pagina_pessoal }}" target="_blank">Página Pessoal</a></p>
        </section>
        {% endif %}
    </article>
    {% empty %}
        <p>Sem docentes.</p>
    {% endfor %}
</section>
{% endblock %}

{% extends "portfolio/base.html" %}
{% block content %}
<h2>{{ titulo }}</h2>
<section>
    <article>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <br>
            <button type="submit">Guardar</button>
            <a href="{% url voltar %}">Cancelar</a>
        </form>
    </article>
</section>
{% endblock %}

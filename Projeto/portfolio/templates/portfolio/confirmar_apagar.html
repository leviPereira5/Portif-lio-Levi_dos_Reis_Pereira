{% extends "portfolio/base.html" %}
{% block content %}
<h2>Confirmar eliminação</h2>
<section>
    <article>
        <header>
            <h3>Tens a certeza que queres apagar "{{ objeto }}"?</h3>
            <p>Esta ação não pode ser revertida.</p>
        </header>
        <form method="post">
            {% csrf_token %}
            <button type="submit">Sim, apagar</button>
            <a href="{% url voltar %}">Cancelar</a>
        </form>
    </article>
</section>
{% endblock %}

{% extends 'portfolio/base.html' %}

{% block content %}
<div class="form-box">
    <div class="form-icon">&#128100;</div>
    <h2>Criar Conta</h2>
    <p class="form-subtitle">Regista-te e começa a publicar artigos</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-full" style="margin-top:12px;">Criar conta</button>
    </form>

    <div class="form-links">
        <span>Já tens conta? <a href="{% url 'login' %}">Iniciar sessão</a></span>
    </div>
</div>
{% endblock %}

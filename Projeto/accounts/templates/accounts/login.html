{% extends 'portfolio/base.html' %}

{% block content %}
<div class="form-box">
    <div class="form-icon">&#128274;</div>
    <h2>Bem-vindo de volta</h2>
    <p class="form-subtitle">Inicia sessão para acederes ao portfólio</p>

    {% if erro %}
        <p class="erro">&#9888; {{ erro }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <label for="username">Utilizador</label>
        <input type="text" id="username" name="username" placeholder="O teu nome de utilizador" required autofocus>

        <label for="password">Palavra-passe</label>
        <input type="password" id="password" name="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>

        <button type="submit" class="btn-full" style="margin-top:8px;">Entrar</button>
    </form>

    <div class="form-divider">ou</div>

    <a href="{% url 'pedir_magic_link' %}" class="btn-full" style="background:#6366f1;">&#128279; Entrar com Link Mágico</a>

    <div class="form-links">
        <span>Ainda não tens conta? <a href="{% url 'registo' %}">Criar conta</a></span>
    </div>
</div>
{% endblock %}
